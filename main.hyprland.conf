
################
### MONITORS ###
################

# See https://wiki.hyprland.org/configuring/Monitors/
monitor= HDMI-A-1,2560x1440@100Hz,auto,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = kitty -e nnn 
$browser = zen-browser
$menu = rofi -icon-theme "Papirus" -show-icons
$screenShot = hyprshot -o ~/Screenshot -m active


#################
### AUTOSTART ###
#################

exec-once = telegram-desktop -startintray
exec-once = zen-browser
exec-once = keepassxc ~/Documents/Security/Пароли.kdbx 
exec-once = syncthing serve
exec-once = AmneziaVPN 
exec-once = udiskie
exec-once = hypridle
exec-once = $HOME/.config/hypr/scripts/change-wallpaper.sh
exec-once = wl-paste --watch clipvault store

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,14
env = HYPRCURSOR_SIZE,14
# env = GTK_THEME,_Nordic
#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.425

    repeat_rate = 100 
    repeat_delay = 200

    touchpad {
        natural_scroll = false
    }
}

misc {
    enable_swallow = true
}

